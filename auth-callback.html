<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5tars — جاري تسجيل الدخول...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #0B1F4E, #1A3A8F);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.box {
  text-align: center;
  padding: 40px;
}
.spinner {
  width: 56px; height: 56px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #F5B429;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}
p {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
}
.error-box {
  display: none;
  background: rgba(220,38,38,0.15);
  border: 1px solid rgba(220,38,38,0.3);
  border-radius: 12px;
  padding: 16px 24px;
  margin-top: 20px;
  font-size: 13px;
  color: #FCA5A5;
}
.btn-retry {
  display: inline-block;
  margin-top: 20px;
  background: #F5B429;
  color: #0B1F4E;
  padding: 12px 28px;
  border-radius: 10px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  display: none;
}
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">جاري تسجيل الدخول...</h2>
  <p id="subtitle">يرجى الانتظار لحظة</p>
  <div class="error-box" id="errorBox"></div>
  <a href="signup.html" class="btn-retry" id="retryBtn">← حاول مرة أخرى</a>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://xdmbwtnpadjeinclmffh.supabase.co',
  'sb_publishable_MXzO5_juPmKitzZ4JQ5Ddw_vvLxcH1i',
  {
    auth: {
      detectSessionInUrl: true,
      persistSession: true,
      autoRefreshToken: true,
      flowType: "pkce"
    }
  }
);

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'حدث خطأ';
  document.getElementById('subtitle').textContent = 'لم نتمكن من تسجيل دخولك';
  document.getElementById('errorBox').textContent = msg;
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('retryBtn').style.display = 'inline-block';
}

async function handleCallback() {
  try {
    await new Promise(resolve => setTimeout(resolve, 1000));

    const { data: { session }, error } = await sb.auth.getSession();
    
    if (error) throw error;

    if (session) {
      await saveProfile(session.user);
      // انتظر ثانيتين حتى تُحفظ الـ session في المتصفح
      await new Promise(resolve => setTimeout(resolve, 2000));
      window.location.replace('dashboard.html');
      return;
    }

    const timeout = setTimeout(() => {
      showError('انتهت مهلة الانتظار. حاول مرة أخرى.');
    }, 10000);

    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        clearTimeout(timeout);
        await saveProfile(session.user);
        // انتظر ثانيتين حتى تُحفظ الـ session
        await new Promise(resolve => setTimeout(resolve, 2000));
        window.location.replace('dashboard.html');
      }
    });

  } catch (err) {
    showError('تعذر تسجيل الدخول: ' + (err.message || 'خطأ غير معروف'));
  }
}

async function saveProfile(user) {
  try {
    const name = user.user_metadata?.full_name || 
                 user.user_metadata?.name || 
                 user.email;
    
    await sb.from('profiles').upsert({
      id: user.id,
      full_name: name,
      phone: user.user_metadata?.phone || '',
      business_type: user.user_metadata?.business_type || '',
      plan: 'trial',
      trial_ends: new Date(Date.now() + 14*24*60*60*1000).toISOString(),
      created_at: new Date().toISOString()
    }, { onConflict: 'id', ignoreDuplicates: true });
  } catch (e) {
    // لا توقف التحويل حتى لو فشل حفظ الـ profile
    console.log('profile save:', e.message);
  }
}

handleCallback();
</script>
</body>
</html>
