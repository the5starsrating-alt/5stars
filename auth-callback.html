<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5tars — جاري تسجيل الدخول...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #0B1F4E, #1A3A8F);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.box {
  text-align: center;
  padding: 40px;
}
.spinner {
  width: 56px; height: 56px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #F5B429;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}
p {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
}
.error-box {
  display: none;
  background: rgba(220,38,38,0.15);
  border: 1px solid rgba(220,38,38,0.3);
  border-radius: 12px;
  padding: 16px 24px;
  margin-top: 20px;
  font-size: 13px;
  color: #FCA5A5;
}
.btn-retry {
  display: inline-block;
  margin-top: 20px;
  background: #F5B429;
  color: #0B1F4E;
  padding: 12px 28px;
  border-radius: 10px;
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  display: none;
}
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">جاري تسجيل الدخول...</h2>
  <p id="subtitle">يرجى الانتظار لحظة</p>
  <div class="error-box" id="errorBox"></div>
  <a href="signup.html" class="btn-retry" id="retryBtn">← حاول مرة أخرى</a>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://xdmbwtnpadjeinclmffh.supabase.co',
  'sb_publishable_MXzO5_juPmKitzZ4JQ5Ddw_vvLxcH1i',
  {
    auth: {
      detectSessionInUrl: true,
      persistSession: true,
      autoRefreshToken: true,
      flowType: "implicit"
    }
  }
);

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'حدث خطأ';
  document.getElementById('subtitle').textContent = 'لم نتمكن من تسجيل دخولك';
  document.getElementById('errorBox').textContent = msg;
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('retryBtn').style.display = 'inline-block';
}

async function handleCallback() {
  try {
    // مع implicit flow، الـ token يجي في الـ URL hash
    // Supabase يعالجه تلقائياً عبر detectSessionInUrl: true
    
    // أعطه لحظة يعالج الـ hash
    await new Promise(resolve => setTimeout(resolve, 500));

    const { data: { session }, error } = await sb.auth.getSession();
    
    if (error) throw error;

    if (session) {
      window.location.replace('dashboard.html');
      return;
    }

    // استنى onAuthStateChange كـ fallback
    const timeout = setTimeout(() => {
      showError('انتهت مهلة الانتظار. حاول مرة أخرى.');
    }, 8000);

    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        clearTimeout(timeout);
        window.location.replace('dashboard.html');
      }
    });

  } catch (err) {
    showError('تعذر تسجيل الدخول: ' + (err.message || 'خطأ غير معروف'));
  }
}

handleCallback();
</script>
</body>
</html>
